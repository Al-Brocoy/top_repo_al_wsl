<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="left-side">
        <div class="odin-logo">
            <img src="img_src/odin_logo.png" alt="" width="80px">
            <span>ODIN</span>
        </div>
        <img src="img_src/leaf_bg.avif" alt="" id="leaf-bg" >
    </div>
    <div class="right-side">
        <div class="hero">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dream.Sign up now to get started.</p>
            <p><br>You know you want to.</p>
        </div>

        <form action="post">
            <div class="input-box">
                <legend>Let's do this!</legend>

                <div class="input-fields">
                    <div>
                        <label for="firstname">FIRST NAME</label>
                        <input type="text" name="firstname" id="firstname">
                    </div>

                    <div>
                        <label for="lastname">LAST NAME</label> 
                        <input type="text" name="lastname" id="lastname">
                    </div>

                    <div>
                        <label for="userEmail">EMAIL</label>
                        <input type="email" id="userEmail" name="email">
                    </div>

                    <div>
                        <label for="phone">PHONE NUMBER</label> 
                        <input type="number" name="phone" id="phone">
                    </div>

                    <div>
                        <label for="password">PASSWORD</label>
                        <input type="password" name="password" id="password">
                    </div>

                    <div>
                        <label for="confirm-pass">CONFIRM PASSWORD</label>
                        <input type="password" name="confirm-pass" id="confirm-pass">
                    </div>
                </div>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <div class="bottom">
            <p>Already have an account?<a href="#">Log in</a></p>
        </div>

    </div>
</body>
</html>
