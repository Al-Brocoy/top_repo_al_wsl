<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="left-side">

    </div>
    <div class="right-side">
        <div class="hero">
            <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ut quia eum enim et totam ex nisi officia cum voluptatibus asperiores reprehenderit nostrum neque, impedit aperiam deserunt at dolore sit accusantium.</p>
        </div>

        <form action="post">
            <div class="input-box">
                <legend>Let's do this!</legend>

                <label for="firstname">FIRST NAME</label>
                <input type="text" name="firstname" id="firstname">

                <label for="lastname">LAST NAME</label> 
                <input type="text" name="lastname" id="lastname">

                <label for="userEmail">EMAIL</label>
                <input type="email" id="userEmail" name="email">

                <label for="phone">PHONE NUMBER</label> 
                <input type="number" name="phone" id="phone">

                <label for="password">PASSWORD</label>
                <input type="password" name="password" id="password">

                <label for="confirm-pass">CONFIRM PASSWORD</label>
                <input type="password" name="confirm-pass" id="confirm-pass">
            </div>
            <button type="submit">Create Account</button>
        </form>
        <div class="bottom">
            <p>Already have an account?<a href="#">Log in</a></p>
        </div>

    </div>
</body>
</html>
